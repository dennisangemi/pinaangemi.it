      materiale: Resina

  - id: gorilla_silverback
    titolo: "Gorilla Silverback"
    soggetto: Gorilla silverback
    mostra: primitivus_2026
    descrizione: |
      "Tutto è iniziato da uno sguardo. Non è avvenuto dal vivo, nel calore umido di una foresta equatoriale, ma attraverso la lente fredda eppur rivelatrice di una fotografia del National Geographic. In quell'immagine vidi un primate, un gorilla silverback (dal dorso d'argento), i suoi occhi mi fissavano semplicemente; mi interrogavano. In quell'istante, quella che poteva sembrare una semplice immagine documentaristica è diventata per me un'epifania, innescando un'urgenza creativa che non potevo ignorare."
    concept: |
      "Il Gorilla nelle mie opere non è solamente una 'bestia', ma un archetipo, o meglio
      ancora un Totem. È uno specchio oscuro e lucente in cui riflettersi. Rappresenta
      quelle parti più profonde e istintive del nostro animo che la società moderna ha
      cercato di addomesticare o nascondere; il gorilla nella mia psiche diventa il simbolo
      sacro dello spirito libero, nella speranza che un giorno, l'essere umano si renda
      conto che rispettare madre natura equivale a preservare noi stessi dall'estinzione."
    quadri:
      numero_opere: 14
      tecnica: Carboncino su carta
      note_tecniche: |
        "Ho scelto di lavorare prevalentemente in bianco e nero per spogliare l'immagine
        di ogni distrazione, per arrivare all'essenza della forma, anche se ogni tanto ho
        inserito delle 'fratture cromatiche', i loro occhi si accendono come un braciere
        ardente che ci interroga; è la vita che pulsa, come l'urgenza di esistere. I riflessi
        sul pelo si tingono di ambra e ocra, colori caldi, terrestri, che richiamano la luce
        del tramonto nella foresta, l'oro antico di una regalità primitiva."
      concept: |
        "Ho creato 14 disegni di creature diverse: cuccioli con le madri, esemplari che
        sembrano in una naturale riflessione, altri ancora che giocano e si nascondono
        all'interno del loro habitat. Ogni esemplare attraverso le pieghe del volto narra
        espressioni molto simili alle nostre."
    sculture:
      numero_opere: 6
      materiale: Resina
      # colori da associare singolarmente a ogni opera: rosso, giallo, blu, petrolio, verde cangiante, trasparente
      note_tecniche: |
        "Ho scelto di lavorare con la resina per la sua straordinaria capacità di catturare
        e trasformare la luce, utilizzando un'unica matrice formale. La forma è uguale per
        tutti, cambia la colorazione. Un gorilla seduto, in una posizione di attesa
        monumentale, quasi un Buddha della foresta pluviale, non hanno braccia, nella
        creazione che in realtà avviene un'astrazione, il dorso del gorilla appare a forma
        di cuore, come a voler abbracciare l'universo. I colori vanno dai primari, rosso,
        giallo e blu, al petrolio o verde cangiante, per approdare al trasparente, capace
        di raccogliere luce e colori circostanti."
      descrizione: |
        "La sua forma è un'astrazione del primato, quasi un totem, legato sempre al culto
        della natura."

