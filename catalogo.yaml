  # — Sculture singole ——————————————————————————————————————————————————————

  - id: noi_siamo_natura
    titolo: "Noi siamo Natura"
    categoria: scultura
    materiale: Legno di Tulipier
    soggetto: Figura antropomorfa
    anno: 2024
    mostra: noi_siamo_natura_2024
    immagine: assets/imgs/sculture/legno/noi_siamo_natura.jpg
    descrizione: |
      "Scultura in legno Tulipier, una figura antropomorfa, attraverso le forme concave e
      convesse, descrivo la nostra unione e unità con tutto l'universo. 'Hen Kay Pan'
      Uno e tutto."
    concept: |
      "Ho inserito una scultura in legno antropomorfa che rappresenta madre natura,
      il fulcro del mio discorso narrativo e creativo."

  - id: profilo_scultura
    titolo: ""
    categoria: scultura
    materiale:
      - Legno di ulivo
      - Resina Epossidica
      - Acciaio
    dimensioni:
      scultura: "70 × 30 × 12 cm"
      base: "40 × 20 cm"
    soggetto: Figura femminile bifacciale
    anno: 2024
    certificato_autenticita: true
    immagine: assets/imgs/sculture/legno/profilo_scultura.jpg
    descrizione: |
      "Questa scultura, alta 70 cm, è un'opera bifacciale che vive di contrasti. Da un
      lato, emerge un volto femminile di profilo, scolpito con linee morbide che dialogano
      con la venatura tormentata del legno. Sul lato opposto, lo stesso volume si
      trasforma: il volto si intravede appena, mentre gli incavi naturali e le ferite del
      tempo nell'ulivo sono stati colmati e 'sanati' da colate di resina epossidica, che
      cristallizza la luce e crea un prezioso mosaico cromatico."
    note_tecniche: |
      "La natura è l'artista co-autore: ho scelto di preservare la corteccia originale nella
      parte superiore, che si trasforma naturalmente in una fluente chioma di capelli,
      accentuando il legame ancestrale della figura con l'albero stesso. Due fori passanti
      aprono l'opera, permettendo alla luce e allo spazio circostante di penetrare e
      dialogare con la forma. L'opera è saldamente ancorata a una base monolitica in
      acciaio, conferendo stabilità e un tocco 'industrial' che la rende perfetta per un
      ambiente contemporaneo."

  - id: la_terza_via
    titolo: "La terza via"
    categoria: scultura
    materiale: Bronzo
    soggetto: Figura femminile astratta
    mostra: noi_siamo_natura_2024
    ispirazione: Venere di Willendorf
    immagine: assets/imgs/sculture/bronzo/la_terza_via.jpg
    descrizione: |
      "La figura trae ispirazione dalla Venere di Willendorf, con forme essenziali, quasi
      astratte, ma riconducibili ancora una volta, alla terza via, o una nuova possibilità
      nel rispetto del nostro ecosistema. Una nuova speranza per un futuro migliore."

  - id: sadness_pietra
    titolo: "Sadness"
    anno: 2022
    categoria: scultura
    materiale: Pietra
    # dimensioni: non disponibili nei documenti – da completare
    soggetto: Figura femminile stilizzata
    immagine: assets/imgs/sculture/pietra/sadness.jpg
    descrizione: |
      "Dal titolo possiamo capire il senso della figura femminile abbastanza stilizzata.
      La figura è in verticale quasi simile ad una colonna greca, con la testa piegata da
      un lato della spalla, esprime sofferenza e nello stesso tempo accettazione, mentre
      le sue dolci forme arrotondate, come l'ovale della testa, il seno appena accennato,
      consegnano una forma armoniosa e piena di luce. Sadness non vuole essere un
      messaggio negativo all'osservatore, la tristezza fa parte di noi come la gioia, è un
      tassello molto importante della nostra vita, bisogna riconoscerlo. L'opera non
      simboleggia la rassegnazione, ma la volontà viva di voler portare il peso del
      'mondo' sulle spalle con forza, coraggio e dolcezza, mantenendo tutte le virtù
      femminili legati all'animo universale del mondo."

  - id: sadness_ceramica
    titolo: Sadness
    immagine: assets/imgs/sculture/ceramica/sadness_ceramica.jpg
    anno: 2022
    materiale: "Ceramica"
    categoria: scultura

  - id: nuovo_giorno
    immagine: assets/imgs/quadri/nuovo_giorno.jpeg
    anno: 2025
    titolo: "Il nuovo giorno" 
    categoria: quadro
    materiale: "carbotelli su carta, sfondo in  foglia oro"
    descrizione: |
      "Il Gallo spesso utilizzato come simbolo di San Vito, si rifà a Gesù, alla resurrezione, ma soprattutto, rappresenta la luce divina del nuovo giorno che sconfigge le tenebre della notte."

  - id: esistenza
    titolo: "L'esistenza"
    anno: 2022
    categoria: scultura
    dimensioni: 140 x 40 cm
    materiale: "Gesso alabastrino, ottone, plexiglass"
    # dimensioni: non disponibili nei documenti – da completare
    soggetto: ~
    immagine: assets/imgs/sculture/pietra/esistenza.jpg
    riferimenti_filosofici:
      - "Velo di Maya"
      - "Caverna di Platone"
    descrizione: |
      "Appena nasciamo veniamo addomesticati, nelle modalità che vuole la società in cui
      viviamo. Si forma il nostro pensiero. Tutto viene costruito e conficcato nelle nostre
      menti, come dei pali di architetture morali, conformi al nostro presente. La nostra
      mente rimane chiusa dentro una gabbia dorata... All'interno vi regna la 'perfezione',
      l'armonia, il giusto, il normale... Non vi è posto per il deforme, il diverso, il nuovo...
      Tutto ha un sapore vecchio e rasserenante.
      Ma un bel giorno avviene qualcosa che sovverte tutto. Arriva all'improvviso come un
      lampo a ciel sereno: l'inconsueto, l'imprevedibile, l'imponderabile... uno squarcio,
      uno sfondamento, un trauma irrompe e frantuma in mille pezzi la favola che ci hanno
      raccontato. La gabbia si apre, il cerchio si sfonda, nasce una nuova luce: il reale,
      l'imperfetto, l'orrido, ma soprattutto il vero. Ma è nello squarcio, (come nel velo di
      maya, o nel buio della caverna di Platone) che si ha la possibilità di guardare la
      nostra esistenza sotto una luce nuova. E in quella luce, che è una luce cosmica,
      vi è la salvezza dell'intera umanità."

  - id: big_bang
    immagine: assets/imgs/quadri/big_bang.jpg
    anno: 2023
    titolo: "Big Bang"
    categoria: quadro
    materiale: "Acrilici e resina"