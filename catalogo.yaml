artista:
  nome: Pina Angemi
  formazione: Laureata in scultura all'Accademia di Belle Arti di Catania
  bio: |
    "Mi sono laureata in scultura all'accademia di belle arti di Catania. Il mio interesse per la natura mi ha portato allo studio di forme antropomorfe; nel titolo che ho voluto dare: 'Noi siamo Natura' c'è già la vera essenza della mia ricerca. Spazio dalla scultura, alla pittura, esplorando varie tecniche: dal carboncino alla resina cercando di plasmare il mio pensiero. Le opere esposte nella mostra, raccontano di una natura non assoggettata all'uomo, ma libera di crescere senza costrizioni e sfruttamento. Nella mia dimensione esiste un 'Hen Kay Pan', noi siamo parte del tutto, e se non rispettiamo il luogo che ci ha partorito, l'umanità non avrà speranza alcuna."
  immagine_profilo: assets/imgs/pina_angemi_profile_pic.jpg

