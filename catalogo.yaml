  - id: dentro_le_pieghe
    titolo: "Dentro le Pieghe"
    anno: 2025
    categoria: quadro
    # tecnica: ~  # da completare
    immagine: assets/imgs/quadri/dentro_le_pieghe.jpg
    descrizione: |
      "L'opera rappresenta una parte del mantello simbolico di San Vito. Non vi è la sua
      figura, ma la sua assenza; tuttavia, solo con la sua mancanza figurativa, si percepisce
      la sua presenza. Attraverso le pieghe della scultura, concrete e tangibili, cerco di
      rendere vivo qualcosa che non è. Come quando perdi una persona amata, e mediante
      i suoi indumenti cerchi ancora la sua presenza. Ho cercato di creare una sorta di
      'sindone', ove ancora, attraverso il movimento del panneggio, si possa captare una
      sorta di presenza/assenza. Nella speranza che questa piccola porzione di mantello,
      possa metaforicamente, guarire il nostro mondo dalla mancanza sempre più greve
      di Umanità."

